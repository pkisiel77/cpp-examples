name: Check examples

on:
  push:
  pull_request:

jobs:
  check-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check examples and links
        run: BUILD_DIR=/tmp/cpp-examples-build sh tools/check-examples.sh

      - name: Check ebook metadata
        run: python3 tools/check-ebook-metadata.py
